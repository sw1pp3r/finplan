# finplan — self-hosted cash-flow planner (PostgreSQL by default).
#
# First run (from a clone):   docker compose up -d --build
#   → builds the app image, starts PostgreSQL + the app, serves http://localhost:8742
#
# Update later (pull the published image):
#   docker compose pull && docker compose up -d
#
# PostgreSQL is the default so your deployment matches what the project is
# tested and run against in production. The database is reachable only inside
# this compose network — its port is intentionally NOT published to the host.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finplan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finplan}
      POSTGRES_DB: ${POSTGRES_DB:-finplan}
    volumes:
      - finplan-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finplan} -d ${POSTGRES_DB:-finplan}"]
      interval: 5s
      timeout: 5s
      retries: 12

  finplan:
    image: ghcr.io/sw1pp3r/finplan:latest
    build: .
    container_name: finplan
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-finplan}:${POSTGRES_PASSWORD:-finplan}@db:5432/${POSTGRES_DB:-finplan}}
      FINPLAN_FX_AUTOFETCH: "0"
      FINPLAN_IMAGE_DIR: /srv/finplan/wish-images
    ports:
      - "8742:8000"
    volumes:
      - finplan-images:/srv/finplan/wish-images

volumes:
  finplan-db:
  finplan-images:
